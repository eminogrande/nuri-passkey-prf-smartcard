<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuri Card Cosign Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 32px 16px;
      }
      main {
        width: min(980px, 100%);
      }
      h1 {
        font-size: 28px;
        line-height: 1.15;
        margin: 0 0 20px;
      }
      label {
        display: block;
        color: #9da7b3;
        font-size: 13px;
        font-weight: 700;
        margin: 18px 0 8px;
      }
      textarea, input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #30363d;
        background: #010409;
        color: #e6edf3;
        border-radius: 8px;
        padding: 12px;
        font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      textarea {
        min-height: 76px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 18px 0;
      }
      button {
        border: 1px solid #3b82f6;
        background: #1d4ed8;
        color: white;
        border-radius: 8px;
        padding: 11px 16px;
        font-weight: 800;
        cursor: pointer;
      }
      button.secondary {
        border-color: #30363d;
        background: #161b22;
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #010409;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 16px;
        min-height: 220px;
        font-size: 13px;
      }
      .ok {
        color: #7ee787;
        font-weight: 800;
      }
      .bad {
        color: #ff7b72;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nuri Card Cosign Demo</h1>
      <label for="message">Message to hash as msg32</label>
      <textarea id="message">nuri local card cosign demo</textarea>
      <label for="msg32">Or provide exact msg32 hex</label>
      <input id="msg32" placeholder="64 hex chars, optional" spellcheck="false" />
      <div class="row">
        <button id="info">Card Info</button>
        <button id="sign">Create Valid MuSig2 Signature</button>
        <button class="secondary" id="clear">Clear</button>
      </div>
      <div id="status"></div>
      <pre id="out">Ready.</pre>
    </main>
    <script>
      const out = document.querySelector("#out");
      const status = document.querySelector("#status");
      const message = document.querySelector("#message");
      const msg32 = document.querySelector("#msg32");

      function show(payload) {
        out.textContent = JSON.stringify(payload, null, 2);
        if (payload.final_signature_verified || payload.status === "NURI_CARD_COSIGN_SERVER_READY") {
          status.innerHTML = '<span class="ok">OK</span>';
        } else if (payload.error) {
          status.innerHTML = '<span class="bad">ERROR</span>';
        }
      }

      async function getInfo() {
        const res = await fetch("/api/cosign/info");
        show(await res.json());
      }

      async function sign() {
        const body = {};
        if (msg32.value.trim()) body.msg32 = msg32.value.trim();
        else body.message = message.value;
        const res = await fetch("/api/cosign/sign", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(body),
        });
        show(await res.json());
      }

      document.querySelector("#info").addEventListener("click", getInfo);
      document.querySelector("#sign").addEventListener("click", sign);
      document.querySelector("#clear").addEventListener("click", () => {
        out.textContent = "Ready.";
        status.textContent = "";
      });
      getInfo().catch((error) => show({ error: error.message }));
    </script>
  </body>
</html>
